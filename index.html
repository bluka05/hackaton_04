<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Strichpunkt+Sans:wght@400..900&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="styles.css" />
		<title>Government Census Registration Form</title>
	</head>
	<body>
		<form id="eventRegistrationForm" action="#">
			<h1>Government Census Registration Form</h1>
			<!-- Additional form elements will be added here -->
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" />

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" />

            <label for="tickets">Phone Number:</label>
            <input type="number" id="tickets" name="phone" />

            <label for="tickets">Number of Occupants:</label>
            <input type="number" id="tickets" name="occupants" />

            <label for="tickets">Sin Number:</label>
            <input type="number" id="tickets" name="sin" />


			<button type="submit">Submit</button>
		</form>
		<script src="script.js"></script>
	</body>
</html>
