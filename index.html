<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Strichpunkt+Sans:wght@400..900&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="styles.css" />
		<title>Government Census Registration Form</title>
	</head>
	<body>
		<form id="eventRegistrationForm" action="#">
			<h1>Government Census Registration Form</h1>
			<!-- Additional form elements will be added here -->
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" />

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" />

            <label for="phone">Phone Number:</label>
            <input type="text" id="phone" name="phone" placeholder=" 204-100-1000" />

            <label for="occupants">Number of Occupants:</label>
            <input type="number" id="occupants" name="occupants" />

            <label for="sin">Sin Number:</label>
            <input type="text" id="sin" name="sin" />

            <p>Language Spoken at Home:</p>
            <div id="language-section">
                <label for="lang-french" class="radio-btn">French
                    <input type="radio" id="lang-french" name="language" value="french">
                </label>
                <label for="lang-english" class="radio-btn">English
                    <input type="radio" id="lang-english" name="language" value="english">
                </label>
                <label for="lang-bilingual" class="radio-btn">French and English
                    <input type="radio" id="lang-bilingual" name="language" value="bilingual">
                </label>
            </div>

			<button type="submit">Submit</button>
		</form>
		<script src="script.js"></script>
	</body>
</html>
